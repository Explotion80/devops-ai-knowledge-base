name: AI PR Description

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: read

jobs:
  describe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} | head -c 10000)
          echo "diff<<DIFF_EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "DIFF_EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate description with AI
        id: ai
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$(jq -n \
              --arg diff "$DIFF" \
              '{
                model: "gpt-4o-mini",
                messages: [
                  {
                    role: "system",
                    content: "You are a PR reviewer. Based on the provided git diff, generate a concise PR description in markdown. Include: ## Summary (2-3 bullet points of what changed and why), ## Changes (list of modified files with brief description of each change). Write in Polish. Keep it short and technical."
                  },
                  {
                    role: "user",
                    content: ("Generate a PR description for this diff:\n\n" + $diff)
                  }
                ],
                max_tokens: 1000
              }'
            )")

          DESCRIPTION=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "Nie udalo sie wygenerowac opisu."')
          echo "description<<DESC_EOF" >> "$GITHUB_OUTPUT"
          echo "$DESCRIPTION" >> "$GITHUB_OUTPUT"
          echo "DESC_EOF" >> "$GITHUB_OUTPUT"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF: ${{ steps.diff.outputs.diff }}

      - name: Update PR description
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$(cat <<'EOF'
          ${{ steps.ai.outputs.description }}

          ---
          *Wygenerowano automatycznie przez AI*
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
