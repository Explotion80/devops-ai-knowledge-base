services:
  backend:
    build: .
    container_name: ai-kb-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data   # 🔥 ważne dla PDF i knowledge
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s